<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Timer</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #f4f6f8;
}

.box {
margin-top: 60px;
background: white;
display: inline-block;
padding: 30px;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#time {
font-size: 50px;
margin: 20px 0;
}

button {
padding: 10px 15px;
margin: 5px;
cursor: pointer;
}
</style>
</head>

<body>

<h1>⏱ Study Timer (Pomodoro)</h1>

<div class="box">

<div id="time">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<script>
let time = 25 * 60;
let timer = null;

function updateDisplay() {
let min = Math.floor(time / 60);
let sec = time % 60;

document.getElementById("time").innerText =
min + ":" + (sec < 10 ? "0" + sec : sec);
}

function startTimer() {
if (timer) return;

timer = setInterval(() => {
time--;

updateDisplay();

if (time <= 0) {
clearInterval(timer);
timer = null;
alert("Time is up! Take a break.");
}
}, 1000);
}

function resetTimer() {
clearInterval(timer);
timer = null;
time = 25 * 60;
updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
