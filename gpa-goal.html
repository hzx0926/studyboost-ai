<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Goal Calculator - Plan Your Target GPA</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    font-size: 24px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1558b0;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

.note {
    font-size: 12px;
    color: gray;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 GPA Goal Calculator</h1>

<p>Find out what GPA you need next semester to reach your target GPA.</p>

<input type="number" id="currentGPA" placeholder="Current GPA (e.g. 3.2)" step="0.01">

<input type="number" id="currentCredits" placeholder="Completed Credits (e.g. 60)" step="1">

<input type="number" id="targetGPA" placeholder="Target GPA (e.g. 3.5)" step="0.01">

<input type="number" id="nextCredits" placeholder="Next Semester Credits (e.g. 15)" step="1">

<button onclick="calculateGPA()">Calculate</button>

<div class="result" id="result"></div>

<p class="note">
Tip: Higher GPA requirement means you need stronger performance next semester.
</p>

</div>

<script>
function calculateGPA() {
    let currentGPA = parseFloat(document.getElementById("currentGPA").value);
    let currentCredits = parseFloat(document.getElementById("currentCredits").value);
    let targetGPA = parseFloat(document.getElementById("targetGPA").value);
    let nextCredits = parseFloat(document.getElementById("nextCredits").value);

    if (
        isNaN(currentGPA) || 
        isNaN(currentCredits) || 
        isNaN(targetGPA) || 
        isNaN(nextCredits)
    ) {
        document.getElementById("result").innerHTML = "Please fill in all fields.";
        return;
    }

    let totalCredits = currentCredits + nextCredits;

    let requiredTotalPoints = targetGPA * totalCredits;
    let currentPoints = currentGPA * currentCredits;

    let neededGPA = (requiredTotalPoints - currentPoints) / nextCredits;

    if (neededGPA > 4.0) {
        document.getElementById("result").innerHTML =
        "⚠️ Impossible goal. You would need a GPA higher than 4.0.";
    } 
    else if (neededGPA < 0) {
        document.getElementById("result").innerHTML =
        "🎉 Your target GPA is already achieved!";
    } 
    else {
        document.getElementById("result").innerHTML =
        "You need a GPA of <b>" + neededGPA.toFixed(2) + "</b> next semester.";
    }
}
</script>

</body>
</html>
